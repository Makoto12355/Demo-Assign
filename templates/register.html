<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างบัญชีใหม่ | DemoFull-stack</title>
    <!-- Use both stylesheets for shared variables and specific features if needed -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</head>

<body>

    <div class="register-wrapper">
        <div class="register-card">

            <a href="{{ url_for('login') }}" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                ย้อนกลับ
            </a>

            <h2>สร้างบัญชีใหม่</h2>

            <!-- Shared Flash Message Logic -->
            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="flash-message">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('register.register') }}" method="POST">
                <div class="input-group">
                    <label for="email">อีเมล</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required
                        autocomplete="email">
                </div>
                <div class="input-group">
                    <label for="userid">IDผู้ใช้งาน</label>
                    <input type="text" id="userid" name="userid" placeholder="ตั้งชื่อไอดีของคุณ ex.(Intromel12)"
                        required autocomplete="username">
                </div>
                <div class="input-group">
                    <label for="password">รหัสผ่าน</label>
                    <input type="password" id="password" name="password" placeholder="ตั้งรหัสผ่านที่คาดเดายาก" required
                        autocomplete="new-password">
                </div>
                <div class="input-group">
                    <label for="password_confirm">ยืนยันรหัสผ่านอีกครั้ง</label>
                    <input type="password" id="password_confirm" name="password_confirm"
                        placeholder="พิมพ์รหัสผ่านอีกครั้งเพื่อยืนยัน" required autocomplete="new-password">
                </div>

                <button type="submit" class="btn-submit">สมัครใช้งาน</button>
            </form>

            <div class="login-link-container">
                มีบัญชีอยู่แล้วหรอ? <a href="{{ url_for('login') }}" class="login-link">ลงชื่อเข้าใช้</a>
            </div>
        </div>
    </div>

</body>

</html>
