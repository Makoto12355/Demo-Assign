<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงชื่อเข้าใช้ | DemoFull-stack</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/scripts.js') }}"></script>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <a href="{{ url_for('index') }}" class="btn-back">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                ย้อนกลับ
            </a>

            <h2>ลงชื่อเข้าใช้</h2>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="flash-message">{{ message }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="input-group">
                    <input type="text" name="username" placeholder="IDผู้ใช้ (UserID)" required autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" name="password" placeholder="รหัสผ่าน (Password)" required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit">เข้าสู่ระบบ</button>
            </form>

            <div class="signup-link-container">
                ยังไม่มีบัญชีหรอ? <a href="{{ url_for('register.register') }}" class="signup-link">สร้างบัญชีใหม่</a>
            </div>
        </div>
    </div>

</body>

</html>
